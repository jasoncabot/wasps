<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary -->
    <title>Wasps – A fast and fun card game</title>
    <meta
      name="description"
      content="Play Wasps, a fast and fun browser card game — a custom variant of Crazy Eights with special cards, suit changes, and AI opponents."
    />
    <meta name="author" content="Jason Cabot" />
    <meta name="theme-color" content="#1a3d28" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wasps – A fast and fun card game" />
    <meta
      property="og:description"
      content="Play Wasps in your browser — Crazy Eights with a sting. Special cards, suit changes, and AI opponents with distinct play styles."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Three playing cards fanned on a green felt table with the title Wasps"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wasps – A fast and fun card game" />
    <meta
      name="twitter:description"
      content="Play Wasps in your browser — Crazy Eights with a sting."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="Three playing cards fanned on a green felt table with the title Wasps"
    />

    <!-- PWA / mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Wasps" />
    <meta name="application-name" content="Wasps" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
